<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="style.css">
</head>
<body>

<h2>Admin Panel</h2>

<input type="text" id="name" placeholder="ชื่อนักเรียน">
<input type="text" id="title" placeholder="ผลงาน">
<button onclick="addData()">เพิ่มข้อมูล</button>

<script>
const API_URL = "ใส่URLAppsScript";

function addData(){
  fetch(API_URL,{
    method:"POST",
    body:JSON.stringify({
      id: Date.now(),
      name: document.getElementById("name").value,
      title: document.getElementById("title").value
    })
  })
  .then(res=>res.text())
  .then(msg=>alert(msg));
}
</script>

</body>
</html>
