<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  font-family: Arial;
  background:#111;
  color:white;
  padding:20px;
}
.card{
  background:#1e1e1e;
  padding:20px;
  border-radius:10px;
  margin-bottom:20px;
}
canvas{
  background:white;
  border-radius:10px;
}
</style>
</head>
<body>

<h2>Dashboard</h2>

<div class="card">
  <h3>จำนวนผลงานทั้งหมด</h3>
  <h1 id="total">0</h1>
</div>

<div class="card">
  <h3>กราฟจำนวนผลงานต่อคน</h3>
  <canvas id="barChart"></canvas>
</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbweFD0flTiK6cWKJvhir-AeDFdTiQBfN1pQEK5OyvNnC4PkaQZRyz1X8qqYHgFzYwG9/exec";

function loadStats(){
  fetch(API_URL + "?action=getStats")
  .then(res=>res.json())
  .then(data=>{
    document.getElementById("total").innerText = data.total;
  });
}

function loadChart(){
  fetch(API_URL + "?action=getChartData")
  .then(res=>res.json())
  .then(data=>{

    const labels = data.map(item => item.label);
    const counts = data.map(item => item.count);

    const ctx = document.getElementById("barChart");

    new Chart(ctx, {
      type: 'bar',
      data: {
        labels: labels,
        datasets: [{
          label: 'จำนวนผลงาน',
          data: counts
        }]
      },
      options: {
        responsive: true,
        animation: {
          duration: 1200
        },
        scales: {
          y: {
            beginAtZero: true
          }
        }
      }
    });

  });
}

loadStats();
loadChart();

</script>

</body>
</html>
