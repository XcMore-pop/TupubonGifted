<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin Panel</title>
</head>
<body>

<h2>Admin Dashboard</h2>
<p id="user"></p>
<div id="content" style="display:none;">
  <h3>ยินดีต้อนรับแอดมิน</h3>
  <p>คุณสามารถจัดการข้อมูลได้</p>
</div>

<script>
const API_URL = "ใส่URLAppsScript";

fetch(API_URL + "?action=getUser")
.then(res=>res.json())
.then(data=>{
  if(!data.email){
    alert("กรุณา Login Google ก่อน");
    return;
  }

  if(data.isAdmin){
    document.getElementById("user").innerText = "Logged in: " + data.email;
    document.getElementById("content").style.display = "block";
  }else{
    alert("คุณไม่มีสิทธิ์เข้าหน้านี้");
    window.location.href = "index.html";
  }
});
</script>

</body>
</html>
