<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin Dashboard</title>
<style>
body{
  font-family:Arial;
  background:#0f2027;
  color:white;
  text-align:center;
  padding:40px;
}
button{
  padding:8px 15px;
  margin:5px;
  cursor:pointer;
}
.card{
  background:#1c2e3a;
  padding:20px;
  margin-top:20px;
  border-radius:10px;
}
</style>
</head>
<body>

<h2>Admin Dashboard</h2>
<p id="user"></p>
<button onclick="logout()">Logout</button>

<div id="content" style="display:none;">

<div class="card">
  <h3>เพิ่มผลงาน</h3>
  <input type="text" id="name" placeholder="ชื่อนักเรียน"><br><br>
  <input type="text" id="title" placeholder="ชื่อผลงาน"><br><br>
  <button onclick="addWork()">เพิ่ม</button>
</div>

</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbweFD0flTiK6cWKJvhir-AeDFdTiQBfN1pQEK5OyvNnC4PkaQZRyz1X8qqYHgFzYwG9/exec";

/* ===== ตรวจว่า login แล้วหรือยัง ===== */

if(localStorage.getItem("loggedIn") != "true"){
  window.location.href="login.html";
}else{
  document.getElementById("content").style.display="block";
  document.getElementById("user").innerText =
    "Logged in: " + localStorage.getItem("userEmail");
}

/* ===== เพิ่มผลงาน ===== */

function addWork(){
  fetch(API_URL,{
    method:"POST",
    body:JSON.stringify({
      action:"addWork",
      name:document.getElementById("name").value,
      title:document.getElementById("title").value
    })
  })
  .then(res=>res.text())
  .then(msg=>{
    if(msg=="success"){
      alert("เพิ่มสำเร็จ");
    }else{
      alert("ไม่มีสิทธิ์");
    }
  });
}

/* ===== Logout เฉพาะเว็บ ===== */

function logout(){
  localStorage.removeItem("loggedIn");
  localStorage.removeItem("userEmail");
  window.location.href="login.html";
}
</script>

</body>
</html>
