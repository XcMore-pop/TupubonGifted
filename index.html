<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gifted Classroom Program</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background: linear-gradient(135deg,#1e3c72,#2a5298,#6dd5fa);
  background-size:300% 300%;
  animation:bgMove 10s ease infinite;
  overflow:hidden;
}

@keyframes bgMove{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

.glass{
  backdrop-filter: blur(20px);
  background: rgba(255,255,255,0.12);
  border:1px solid rgba(255,255,255,0.25);
  padding:50px;
  border-radius:25px;
  width:450px;
  text-align:center;
  box-shadow:0 25px 60px rgba(0,0,0,0.3);
  animation:fadeUp 1s ease;
}

@keyframes fadeUp{
  from{opacity:0; transform:translateY(40px);}
  to{opacity:1; transform:translateY(0);}
}

h1{
  font-weight:800;
  color:white;
  font-size:28px;
  margin-bottom:10px;
}

h2{
  font-weight:400;
  color:white;
  margin-bottom:25px;
  opacity:0.9;
}

.btn{
  display:block;
  width:100%;
  padding:14px;
  margin:12px 0;
  border:none;
  border-radius:12px;
  background:white;
  color:#2a5298;
  font-weight:600;
  cursor:pointer;
  transition:0.3s;
}

.btn:hover{
  transform:scale(1.05);
  background:#f1f1f1;
}

.badge{
  display:inline-block;
  background:rgba(255,255,255,0.2);
  padding:6px 15px;
  border-radius:50px;
  color:white;
  font-size:14px;
  margin-bottom:15px;
}

.footer{
  position:absolute;
  bottom:20px;
  color:white;
  opacity:0.8;
  font-size:14px;
}
</style>
</head>

<body>

<div class="glass">
  <div class="badge">Academic Excellence</div>

  <h1>Gifted Classroom Program</h1>
  <h2>ระบบจัดการและแสดงผลงานนักเรียนห้องเรียนพิเศษ</h2>

  <button class="btn" onclick="goUpload()">📂 ส่งผลงาน</button>
  <button class="btn" onclick="goDashboard()">📊 Dashboard ห้องเรียน</button>
</div>

<div class="footer">
  © 2026 Gifted Program | Special Classroom System
</div>

<script>
function goUpload(){
  window.location.href="upload.html";
}

function goDashboard(){
  window.location.href="admin.html";
}
</script>

</body>
</html>
