<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Gifted Program</title>
</head>
<body>

<h1>Gifted Classroom</h1>

<div id="works"></div>

<script>
const API_URL = "ใส่URLตรงนี้";

fetch(API_URL + "?action=getWorks")
.then(res=>res.json())
.then(data=>{
  let div = document.getElementById("works");
  data.forEach(row=>{
    div.innerHTML += `
      <div>
        <h3>${row[1]}</h3>
        <p>${row[2]}</p>
      </div>
    `;
  });
});
</script>

</body>
</html>
